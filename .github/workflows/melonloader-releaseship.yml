# MelonLoader ReleaseShip is built and (on v* tags) published to the GitHub release.
# BepInEx ReleaseShip is built as a WORKFLOW ARTIFACT ONLY — deliberately never
# attached to the release. It self-skips (with a warning) until the deps zip on the
# `deps` release is regenerated with ci/prepare-melonloader-deps.ps1 from an install
# that has BepInEx, so refreshing the zip is what activates it.
name: ReleaseShip

on:
  push:
    branches:
      - main
      - master
    paths:
      - "buddy/**"
      - "ci/**"
      - ".github/workflows/melonloader-releaseship.yml"
    tags:
      - "v*"
  pull_request:
    paths:
      - "buddy/**"
      - "ci/**"
  workflow_dispatch:
    inputs:
      deps_url:
        description: Optional override URL for melonloader-ci-deps.zip
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Crash-hardening lint
        shell: pwsh
        run: pwsh ci/crash-hardening-lint.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Restore MelonLoader build dependencies
        shell: pwsh
        env:
          DEPS_URL_SECRET: ${{ secrets.MELONLOADER_CI_DEPS_URL }}
          DEPS_URL_INPUT: ${{ github.event.inputs.deps_url }}
        run: |
          $ErrorActionPreference = "Stop"
          $depsRoot = Join-Path $env:GITHUB_WORKSPACE "ci\heartopia"
          $zipPath = Join-Path $env:RUNNER_TEMP "melonloader-ci-deps.zip"
          $depsUrl = if ($env:DEPS_URL_INPUT) { $env:DEPS_URL_INPUT } else { $env:DEPS_URL_SECRET }

          if (-not $depsUrl) {
            $release = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/deps" `
              -Headers @{ "User-Agent" = "Bugtopia-CI" }
            $asset = $release.assets | Where-Object { $_.name -eq "melonloader-ci-deps.zip" } | Select-Object -First 1
            if ($asset) {
              $depsUrl = $asset.browser_download_url
            }
          }

          if (-not $depsUrl) {
            throw @"
          MelonLoader CI dependencies are not configured.
          1. Run: pwsh ci/prepare-melonloader-deps.ps1 -HeartopiaDir '<Game>'
          2. Upload ci/melonloader-ci-deps.zip to the GitHub release tagged deps, or
          3. Set repository secret MELONLOADER_CI_DEPS_URL to a direct download URL.
          "@
          }

          Write-Host "Downloading build dependencies..."
          Invoke-WebRequest -Uri $depsUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $depsRoot -Force

          $required = @(
            "MelonLoader\net6\MelonLoader.dll",
            "MelonLoader\net6\MonoMod.RuntimeDetour.dll",
            "MelonLoader\net6\MonoMod.Utils.dll",
            "MelonLoader\Il2CppAssemblies\Assembly-CSharp.dll",
            "MelonLoader\Il2CppAssemblies\Il2CppClient.dll"
          )
          foreach ($rel in $required) {
            $path = Join-Path $depsRoot $rel
            if (-not (Test-Path $path)) {
              throw "Dependency archive is missing required file: $rel"
            }
          }

      - name: Build ReleaseShip (MelonLoader)
        shell: pwsh
        run: |
          dotnet build buddy/buddy.csproj `
            -c ReleaseShip `
            -p:Loader=MelonLoader `
            -p:HeartopiaDir="${{ github.workspace }}\ci\heartopia" `
            -p:ContinuousIntegrationBuild=true `
            --nologo

      - name: Upload bugtopia.dll artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugtopia-melonloader-releaseship
          path: |
            buddy/bin/MelonLoader/ReleaseShip/bugtopia.dll
            buddy/bin/MelonLoader/ReleaseShip/bugtopia.pdb
          if-no-files-found: error

      - name: Check BepInEx CI deps
        id: bepinex_deps
        shell: pwsh
        run: |
          $core = Join-Path $env:GITHUB_WORKSPACE "ci\heartopia\BepInEx\core\BepInEx.Core.dll"
          $interop = Join-Path $env:GITHUB_WORKSPACE "ci\heartopia\BepInEx\interop\Client.dll"
          $present = (Test-Path $core) -and (Test-Path $interop)
          "present=$($present.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if (-not $present) {
            Write-Host "::warning::BepInEx deps missing from melonloader-ci-deps.zip - skipping the BepInEx ReleaseShip build. Regenerate the zip with ci/prepare-melonloader-deps.ps1 (from an install that has BepInEx) and re-upload it to the 'deps' release."
          }

      - name: Build ReleaseShip (BepInEx)
        if: steps.bepinex_deps.outputs.present == 'true'
        shell: pwsh
        run: |
          dotnet build buddy/buddy.csproj `
            -c ReleaseShip `
            -p:Loader=BepInEx `
            -p:HeartopiaDir="${{ github.workspace }}\ci\heartopia" `
            -p:ContinuousIntegrationBuild=true `
            --nologo

      # Artifacts only by design: the BepInEx flavor is NOT attached to the GitHub
      # release below (the release stays MelonLoader-only).
      - name: Upload bugtopia.dll artifact (BepInEx)
        if: steps.bepinex_deps.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bugtopia-bepinex-releaseship
          path: |
            buddy/bin/BepInEx/ReleaseShip/bugtopia.dll
            buddy/bin/BepInEx/ReleaseShip/bugtopia.pdb
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $generated = gh api "repos/${{ github.repository }}/releases/generate-notes" `
            -f "tag_name=${{ github.ref_name }}" --jq .body
          $notes = "Release for MelonLoader`n`n$generated"
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --notes $notes `
            "buddy/bin/MelonLoader/ReleaseShip/bugtopia.dll" `
            "buddy/bin/MelonLoader/ReleaseShip/bugtopia.pdb"
