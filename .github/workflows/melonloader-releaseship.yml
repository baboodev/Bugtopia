# Builds the single unified bugtopia.dll (ReleaseShip) and, on v* tags, publishes it to the GitHub
# release. One DLL works under both MelonLoader (Mods\) and BepInEx (BepInEx\plugins\), so there is
# one build and one artifact. Build deps come from the unified-ci-deps.zip on the 'deps' release
# (regenerate with ci/prepare-ci-deps.ps1 from an install that has both loaders).
name: ReleaseShip

on:
  push:
    branches:
      - main
      - master
    paths:
      - "buddy/**"
      - "ci/**"
      - ".github/workflows/melonloader-releaseship.yml"
    tags:
      - "v*"
  pull_request:
    paths:
      - "buddy/**"
      - "ci/**"
  workflow_dispatch:
    inputs:
      deps_url:
        description: Optional override URL for unified-ci-deps.zip
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Crash-hardening lint
        shell: pwsh
        run: pwsh ci/crash-hardening-lint.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Restore build dependencies
        shell: pwsh
        env:
          DEPS_URL_SECRET: ${{ secrets.MELONLOADER_CI_DEPS_URL }}
          DEPS_URL_INPUT: ${{ github.event.inputs.deps_url }}
        run: |
          $ErrorActionPreference = "Stop"
          $depsRoot = Join-Path $env:GITHUB_WORKSPACE "ci\heartopia"
          $zipPath = Join-Path $env:RUNNER_TEMP "unified-ci-deps.zip"
          $depsUrl = if ($env:DEPS_URL_INPUT) { $env:DEPS_URL_INPUT } else { $env:DEPS_URL_SECRET }

          if (-not $depsUrl) {
            $release = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/deps" `
              -Headers @{ "User-Agent" = "Bugtopia-CI" }
            $asset = $release.assets | Where-Object { $_.name -eq "unified-ci-deps.zip" } | Select-Object -First 1
            if ($asset) {
              $depsUrl = $asset.browser_download_url
            }
          }

          if (-not $depsUrl) {
            throw @"
          Unified CI dependencies are not configured.
          1. Run: pwsh ci/prepare-ci-deps.ps1 -HeartopiaDir '<Game>'   (needs an install with BOTH loaders)
          2. Upload ci/unified-ci-deps.zip to the GitHub release tagged deps, or
          3. Set repository secret MELONLOADER_CI_DEPS_URL to a direct download URL.
          "@
          }

          Write-Host "Downloading build dependencies..."
          Invoke-WebRequest -Uri $depsUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $depsRoot -Force

          $required = @(
            "MelonLoader\net6\MelonLoader.dll",
            "BepInEx\core\BepInEx.Core.dll",
            "BepInEx\core\BepInEx.Unity.IL2CPP.dll",
            "BepInEx\core\MonoMod.RuntimeDetour.dll",
            "BepInEx\interop\Il2Cppmscorlib.dll"
          )
          foreach ($rel in $required) {
            $path = Join-Path $depsRoot $rel
            if (-not (Test-Path $path)) {
              throw "Dependency archive is missing required file: $rel (regenerate unified-ci-deps.zip with ci/prepare-ci-deps.ps1 from an install that has both loaders)."
            }
          }

      - name: Build ReleaseShip (unified)
        shell: pwsh
        run: |
          dotnet build buddy/buddy.csproj `
            -c ReleaseShip `
            -p:HeartopiaDir="${{ github.workspace }}\ci\heartopia" `
            -p:ContinuousIntegrationBuild=true `
            --nologo

      - name: Upload bugtopia.dll artifact
        uses: actions/upload-artifact@v4
        with:
          name: bugtopia-releaseship
          path: |
            buddy/bin/ReleaseShip/bugtopia.dll
            buddy/bin/ReleaseShip/bugtopia.pdb
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $generated = gh api "repos/${{ github.repository }}/releases/generate-notes" `
            -f "tag_name=${{ github.ref_name }}" --jq .body
          $notes = "Unified build — one bugtopia.dll for MelonLoader (Mods\) and BepInEx (BepInEx\plugins\).`n`n$generated"
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --notes $notes `
            "buddy/bin/ReleaseShip/bugtopia.dll" `
            "buddy/bin/ReleaseShip/bugtopia.pdb"
